<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NYAY PRAVAH | Lawyer Portal</title>
    <link rel="stylesheet" href="lawyer-style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <aside class="sidebar">
        <div class="logo"><i class="fas fa-briefcase"></i> <span>NYAY PRAVAH</span>
        </div>
        <nav class="menu">
            <a href="#" class="active"><i class="fas fa-folder"></i> My Cases</a>
            <a href="#"><i class="fas fa-file-upload"></i> Evidence Vault</a>
            <a href="#"><i class="fas fa-calendar-alt"></i> Schedule</a>
            <a href="#" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</a>
        </nav>
        <div class="user-profile">
            <div class="avatar">LC</div>
            <div class="info"><strong>Lead Counsel</strong><span>District Bar</span></div>
        </div>
    </aside>

    <main class="main-content">
        <header class="top-bar">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Search my cases...">
            </div>
            <div class="live-status"><span class="pulse"></span> Compliance Active</div>
        </header>

        <section class="dashboard-header">
            <h2>Case Compliance Inventory</h2>
            <p>Manage evidence audits and adjournment quotas here.</p>
        </section>

        <div id="lawyer-grid" class="case-grid">
            </div>
    </main>

    <div id="upload-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h3><i class="fas fa-upload"></i> Submit Evidence</h3>
            <p style="font-size: 13px; color: #666; margin-bottom: 15px;">Files must be in PDF format for AI Audit.</p>
            <form id="upload-form">
                <input type="hidden" id="active-case-id">
                <div class="input-group">
                    <label>Forensic/Investigation Report</label>
                    <input type="file" id="evidence-file" accept=".pdf" required>
                </div>
                <button type="submit" class="main-btn">Upload & Verify</button>
            </form>
        </div>
    </div>
    <script src="lawyer-dashboard.js" ></script>
    <script>
        const logoutBtn = document.getElementById('logoutBtn');
        if (logoutBtn) {
            logoutBtn.addEventListener('click', (event) => {
                event.preventDefault();
                const shouldLogout = confirm('Do you want to logout?');
                if (shouldLogout) {
                    window.location.href = 'https://www.google.com';
                }
            });
        }
    </script>
</body>
</html>
